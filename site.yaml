# siheonlee.com — 사이트 전역 설정 (v0.3.2)
#
# v0.3.2 차이점:
#   - 검색 UI 정리: home-search (Recent posts 위 인라인 폼) 제거.
#                  nav-search (우측 상단 작은 입력) 만 남김.
#   - nav-search 노출 페이지: home.html, category.html 만.
#                           article.html, 404.html 에서는 제외.
#   - nav-search 미관: 배경/테두리 없이 nav 색상에 녹아드는 italic placeholder,
#                     focus 시 가로로 확장.
#   - 검색 범위 스코핑: 카테고리 인덱스 페이지에서 검색 시
#                     해당 카테고리 내부 글로 한정 (?cat=<slug>).
#                     홈에서 검색 시 전체 글 대상.
#                     search.php 가 결과 헤더에 검색 범위를 표기.
#
# v0.3.1 차이점:
#   - reserved_slugs 에 'search' 추가 (검색 엔드포인트 /search.php 와 충돌 방지).
#
# v0.3 차이점:
#   - 마크다운 파서를 lama_website-main 의 Parsedown.php 로 교체.
#   - meta.yaml 의 styles: 로 본문 태그 속성을 글 단위로 조정 가능.

# 도메인
domain: siheonlee.com
base_url: https://siheonlee.com

# 사이트 정보
# name      — <title> 의 기본값. 원본은 페이지마다 "Lama" 또는 "Lama-About".
# main_title — 모든 페이지 헤더 좌측 상단 큰 글씨. 원본 == "Lama".
name: Lama
main_title: Lama
default_author: 이시헌
default_og_image: /assets/default-og.png

# <title> 서식 (원본은 prefix/suffix 없이 단순 title 만 사용)
default_title_prefix: ""
default_title_suffix: ""

# 저작권 (원본 푸터: "Copyright© 2025. 이시헌. All rights reserved.")
copyright_holder: 이시헌
copyright_year_start: 2025

# slug 예약어 (글 slug 로 사용 금지)
# 카테고리 폴더에서 자동으로 파생되는 slug 들과 충돌 방지.
# About 페이지는 slug=about 으로 사용하므로 reserved 에서 제외.
reserved_slugs:
  - src
  - assets
  - c
  - p
  - api
  - file
  - status
  - blog
  - project
  - research
  - study
  - search        # v0.3.1 — /search.php 검색 엔드포인트와 충돌 방지

# 빌드 옵션
warn_on_underscore_ref: true
warn_on_missing_asset: true
warn_on_stale_updated: true
home_excludes_categories: [About]
home_sort: date_desc

# SEO 폴백
description_truncate: 150

# 마크다운 파서 (v0.3)
#   parsedown — lama_website-main 과 동일한 Parsedown.php (PHP 필요).
#               운영 환경에 `php` 명령이 없으면 builtin 으로 대체.
#   builtin   — Python stdlib 만으로 동작하는 자체 파서 (v0.2 의 그것).
markdown_parser: parsedown

# robots.txt (원본 사이트는 noindex 메타 태그 사용 — robots.txt 는 보존)
robots_txt_main: |
  User-agent: *
  Allow: /

  # Sitemap: https://siheonlee.com/sitemap.xml

robots_txt_legacy: |
  User-agent: *
  Allow: /
