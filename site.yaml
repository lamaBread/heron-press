# siheonlee.com — 사이트 전역 설정.
#
# 페이지 단위 오버라이드:
#   - 메인페이지 (홈)         — Articles/meta.yaml
#   - 카테고리 인덱스 페이지   — Articles/<카테고리경로>/meta.yaml
#   - 글 페이지                — Articles/<카테고리경로>/<글경로>/meta.yaml


# 사이트 도메인 / DNS 호스트명 (예: siheonlee.com)
domain: siheonlee.com
# 사이트 base URL / scheme + host (canonical / sitemap / 피드에 사용)
base_url: https://siheonlee.com

# 사이트 이름 / og:site_name 과 홈/카테고리/시스템 페이지 <title> 기본값
name: heron
# 헤더 좌상단 큰 글씨 / 임의 문자열
main_title: heron
# 기본 저자 / 임의 문자열 (글 seo.author 비우면 폴백)
default_author: 이시헌
# 기본 og:image / site-relative 또는 절대 URL (글/홈/카테고리 seo.og_image 비우면 폴백)
default_og_image: /assets/default-og.png

# 모든 페이지 <html lang> 디폴트 / BCP 47 코드 (예: ko / en / ja)
lang: ko

# 모든 페이지 <title> 기본 prefix — `{prefix}{title}{suffix}` / 임의 문자열
default_title_prefix: ""
# 모든 페이지 <title> 기본 suffix / 임의 문자열
default_title_suffix: ""

# 404 페이지 <title> 본문 / 임의 문자열
error_404_title: Not Found
# 검색 결과 페이지 <title> 본문 / 임의 문자열
search_title: Search

# 저작권자 표시 / 임의 문자열 (푸터에 사용)
copyright_holder: 이시헌
# 저작권 시작 연도 / 정수 (예: 2025)
copyright_year_start: 2025

# 글 slug 로 사용 금지 / 문자열 리스트
reserved_slugs:
  - assets    # /assets/    — 사이트 공용 자원 디렉터리
  - search    # /search.php — 검색 엔드포인트

# 언더스코어 폴더 (`_inactive` 등) 참조 시 워닝 / true / false
warn_on_underscore_ref: true
# meta.yaml 에 지정된 자산이 누락되었을 때 워닝 / true / false
warn_on_missing_asset: true

# 카테고리 자기 페이지의 페이지당 글 수 / 양수 (카테고리 meta.yaml 의 per_page 로 오버라이드)
category_per_page: 20
# 카테고리가 상위 페이지에 section 임베드될 때 페이지당 글 수 / 양수
category_preview_per_page: 5

# 피드 summary (Atom <summary> / RSS <description>) 의 최대 글자 수 / 양수
description_truncate: 150

# /robots.txt 본문 / 여러 줄 문자열
robots_txt_main: |
  User-agent: *
  Allow: /

  Sitemap: https://siheonlee.com/sitemap.xml

# 이미지 자동 최적화 정책 (WebP + 다중 해상도 + lazy loading)
images:
  # 이미지 최적화 전체 토글 / true / false
  enabled: true
  # 생성할 변종 너비 (px) 목록 / 양수 리스트
  widths: [400, 800, 1600]
  # 원본이 이보다 크면 다운스케일 / 0 또는 양수
  max_width: 1600
  # WebP 인코더 quality / 0 ~ 100
  quality: 85
  # 모든 <img> 에 loading="lazy" 자동 부착 / true / false
  lazy_loading: true
  # srcset 과 짝이 되는 sizes 속성 디폴트 / CSS media query
  default_sizes: "(max-width: 800px) 100vw, 800px"

# 글 페이지 <head> 의 schema.org JSON-LD (Article + BreadcrumbList). 기존 OG/canonical 등을 대체 않고 보강.
jsonld:
  # 전체 토글 / true / false. false 면 전 글 미출력 (글 단위 seo.jsonld:false 로 opt-out, 단 사이트 off 시 글 단위 복구 불가)
  enabled: true

# PHP 서명 변수 / `{변수명: 문자열}` 맵.
# 정본 lama.pe.kr 서버는 PHP/GlobalVariables.php 를 auto_prepend 해 글
# 본문 imgBox 캡션 안 `{$reference_hanbyeol}` 같은 토큰을 런타임에
# 치환했다. siheonlee.com 정적 빌드엔 그 런타임이 없으므로 값을 여기
# 옮겨 적으면 빌드 시점에 캡션에 치환된다. 정의 안 된 변수는 빈
# 문자열(PHP 미정의 변수 echo 동작과 동일). 변수명 앞 `$` 는 생략.
php_globals:
  reference_hanbyeol: "Character illustration by 김한별 (kakao ID: zzang767401)"
  reference_hanbyeol_webDesign: "Illustration and Web Design by 김한별 (kakao ID: zzang767401)"

# Google AdSense 통합 (v1.1.3, v1.1.5 에 URL 기반 제외 리스트로 교체).
# 세 필드 모두 빈 문자열/빈 리스트/키 부재 시 자동 비활성 — 블록을 통째로
# 비우거나 지우면 v1.1.2 와 동일한 dist (광고 미통합) 가 된다. 별도
# enabled 마스터 토글은 두지 않는다 (SeoMeta 의 3-state None/''/'text'
# 원칙과 일관).
google_adsense:
  # /ads.txt 본문 / 여러 줄 문자열 (literal `|` 블록 권장 — trailing
  # newline 자동 보존). 빈 문자열이면 dist/ads.txt 미생성 + 이전 빌드의
  # 잔존 ads.txt 가 있으면 자동 삭제. 외부에 노출되는 사이트 루트 정적
  # 파일이므로 https://siheonlee.com/ads.txt 로 직접 검증 가능.
  ads_txt: |
    google.com, pub-1074439863900363, DIRECT, f08c47fec0942fa0
  # 모든 페이지 <head> 에 raw 그대로 삽입할 자동광고 스크립트 (escape
  # 없음 — author 가 명시한 문자열을 신뢰). 빈 문자열이면 5 페이지 모두
  # 미주입 (placeholder 라인 자체가 제거되어 빈 줄도 남지 않음). 적용
  # 대상 = 글·홈·카테고리·404·search.php. admin.php·src/admin/ 은 dist
  # 에 누수되지 않으므로 자연 제외.
  head_script: |
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1074439863900363"
         crossorigin="anonymous"></script>
  # v1.1.5 신설 — head_script 주입에서 제외할 페이지의 URL 목록 / 문자열
  # 리스트. site-relative 절대 경로 ('/' 로 시작), case-sensitive · trailing
  # slash 포함 정확 일치 매칭. 매칭된 URL 의 페이지 head 에 로더 스크립트가
  # 들어가지 않아 Google auto-ads JS 자체가 로드되지 않음 = 광고 원천 차단.
  # 빈 리스트/키 부재면 v1.1.3 과 동일 (5 페이지 전체 주입). 매칭 안 되는
  # URL (오타·삭제된 글) 은 빌드 종료 시 build-report.md "살펴볼 사항" 으로
  # 자동 보고. 인-페이지 광고 위치는 여전히 Google auto-ads 가 결정하며, 이
  # 필드는 "어느 URL 에 로더를 둘지" 의 페이지 단위 on/off 만 제어한다.
  # 페이지별 canonical URL 형식:
  #   홈        = /
  #   글        = /<slug>/             (예: /about/, /picture-frame/)
  #   카테고리  = /<slug_path>/        (예: /blog/, /blog/3d-printing/)
  #   404       = /404.html
  #   검색      = /search.php
  # 예: ['/', '/404.html', '/search.php', '/about/'] — 홈/404/검색/about 차단.
  exclude_urls: [
    '/',
    '/404.html',
    '/search.php',
    '/blog/',
    '/blog/3d-printing/',
    '/blog/cinema/',
    '/blog/gallery/',
    '/blog/moments/',
    '/project/',
    '/project/01-side-project/',
    '/project/02-sw-development-request/',
    '/project/03-capstone-project/',
    '/project/04-personal-research/',
    '/project/05-my-website/',
    '/research/',
    '/research/research-notes-cs/',
    '/research/research-notes-dh/',
    '/study/',
    '/study/lecture-notes/',
    '/study/literature/',
    '/study/paper-review-dh/',
    '/study/programming/'
  ]
