# 도구 언어(user/.heron/locale)로 런타임 lookup. (Agent B 소유 — build.*)

build.warn.pillow_missing: "이미지 최적화가 켜져 있지만 Pillow 가 설치되지 않았습니다. raster 이미지를 만나면 빌드가 중단됩니다. pip install Pillow 로 설치하거나 site.yaml 의 images.enabled 를 false 로 두세요."
build.abort.pillow_raster: "이미지 최적화가 켜져 있는데 Pillow 가 없습니다. raster 이미지를 만났습니다: {file}\n       pip install Pillow 로 설치하거나 site.yaml 의 images.enabled 를 false 로 두세요."

build.warn.legacy_home_key: "site.yaml: '{key}' 는 v0.4.6 부터 Articles/meta.yaml 로 이전되었습니다. site.yaml 에서 제거하고 Articles/meta.yaml 의 해당 필드를 사용하세요."
build.warn.schema_lower: "스키마 스탬프(user/.heron/version={schema}) 가 프로그램 버전(v{version}) 보다 낮습니다. `python Heron.py --migrate` (미리보기 --migrate --dry-run) 또는 Pond 의 업데이트 기능으로 마이그레이션하세요."
build.warn.schema_higher: "스키마 스탬프(user/.heron/version={schema}) 가 프로그램 버전(v{version}) 보다 높습니다 — 더 낮은 버전의 프로그램으로 새 콘텐츠를 빌드 중입니다. 프로그램 업그레이드를 권장."

build.warn.adsense_exclude_orphan: "google_adsense.exclude_urls 의 \"{url}\" 가 빌드 결과 어느 페이지 URL 과도 매칭되지 않습니다 — 오타 또는 삭제된 글일 가능성 (광고 차단 없음)."
build.warn.empty_category: "이 카테고리에 글이 하나도 없습니다 (빈 카테고리)."
build.issue.empty_slug: "카테고리 폴더명이 빈 slug 로 변환됩니다: {folder} — 카테고리가 빌드되지 않을 수 있습니다."
build.warn.non_ascii_slug: "URL slug 에 비ASCII 문자 포함: '{folder}' → '{slug}'. 빌드는 정상 진행되었으나, URL 가독성/공유성을 위해 폴더명을 ASCII (영문/숫자/하이픈) 로 바꾸는 것을 권장합니다."
build.warn.excluded_asset_ref: "본문이 빌드에서 제외된 자산을 참조: {ref}"
build.warn.unfilled_placeholder: "템플릿에 채우지 못한 placeholder 가 발견되어 빈 문자열로 strip 되었습니다: {{{{{name}}}}}."

# ── 빌드 16단계 진행 라벨 (builder._step) ──────────────────────────
# `[ n/16] {라벨}` 의 라벨. 콘솔 + build-report.md "단계별 시간" 표에 동일 사용.
build.step.1: "설정 로드 (site.yaml / 토크나이저 패리티)"
build.step.2: "글 폴더 스캔 (user/articles/)"
build.step.3: "meta.yaml 파싱"
build.step.4: "검증 / 카테고리 트리 구축"
build.step.5: "자산 동기화 / 이미지 최적화 (WebP)"
build.step.6: "사이트 공통 자산 복사"
build.step.7: "카테고리/홈 CSS 복사"
build.step.8: "글 렌더링"
build.step.9: "카테고리 페이지"
build.step.10: "홈 페이지"
build.step.11: "404 페이지"
build.step.12: "robots.txt / ads.txt"
build.step.13: "sitemap.xml"
build.step.14: "RSS / Atom 피드"
build.step.15: "검색 인덱스 (dist/search.php)"
build.step.16: "고아 산출물 정리"

# ── 빌드 마일스톤·요약 콘솔 라인 (builder._emit / _live) ───────────
build.console.start: "빌드 시작 - Heron v{ver} ({time})"
build.console.no_cache: "  (증분 캐시 비활성 - --no-cache)"
build.console.live_render: "  글 {i}/{n}  {slug}"
build.console.live_asset_img: "  자산 글 {i}/{n}  {slug}  (이미지 {img} 변환  {rel})"
build.console.live_asset_copy: "  자산 글 {i}/{n}  {slug}  ({rel})"
build.console.articles_done: "        {n} 글 처리 (캐시 {hit} hit / {miss} miss)."
build.console.assets_done: "        {n} 글 자산 동기화 (이미지 {img} 변환)."
build.console.internal_links: "        내부 링크 검증: {n} 건 깨짐."
build.console.done: "빌드 완료: {art} 글, {cat} 카테고리, {issue} 보완 필요, {warn} 살펴볼 사항{php}. ({elapsed:.1f}s)"
build.console.done_php: ", PHP 빌드 {n}건"
build.console.cache: "증분 캐시: {hit} 히트 / {miss} 미스 (글 {n}건)."
build.console.output: "산출물: dist/ (Heron)."
build.console.report_written: "리포트 문서: {name} 생성 ({path})."
build.console.report_write_failed: "[경고] build-report.md 작성 실패: {error}"

# ── 토크나이저 패리티 진단 (search.run_parity_test, 전역 i18n.t()) ──
build.parity.ok: "[search] 토크나이저 패리티 OK ({n} fixtures)"
build.parity.cached: "[search] 토크나이저 패리티 (캐시됨: {n} fixtures)"
build.parity.php_missing: "PHP 없음 — 토크나이저 패리티 검증 생략."

# ── 빌드 리포트 (report.py render/render_markdown + builder._write_build_report) ──
# render() — 콘솔(stderr) 요약. render_markdown()/_write_build_report — build-report.md.
