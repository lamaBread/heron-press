build.report.md_php_h2: "## PHP 로 빌드된 글 ({n}건)"
build.report.md_php_note: "_의도된 출력 — `imgBox`/`imgSlideBox` 외 살아 있는 PHP 구문이 있는 글은 `index.php` 로 떨어진다. 시스템 결함이 아니라 작성자(웹 개발자)의 명시적 선택._"
build.report.md_summary: "> **빌드 리포트 요약**: 보완 필요 {issue}건, 살펴볼 사항 {warn}건"
