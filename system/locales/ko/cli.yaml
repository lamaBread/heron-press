# 로케일 팩 (ko, 정본) — Surface 3: 운영자 대면 CLI/배포/업데이트/마이그레이션
# 메시지. Pond 의 빌드·배포·업데이트 패널과 `python Heron.py <액션>` 콘솔에
# 그대로 흐른다. 도구 언어(user/.heron/locale)로 조회 — 전역 i18n.t() (v1.9.1).
# 형식: 플랫 닷키 → 인용 문자열. {name} 은 .format 치환. \n 은 개행.

