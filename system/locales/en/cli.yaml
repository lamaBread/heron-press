cli.locale.ok: "{code}: OK ({total} keys)"
cli.locale.invalid_code: "Invalid locale code: {code} (must match [A-Za-z][A-Za-z0-9-]*)"
cli.locale.scaffold_exists: "Locale already exists, refusing to overwrite: {code}"
cli.locale.scaffold_copied: "copied {count} files: {code}"
cli.locale.endonym_injected: "Injected endonym key admin.locale.name.{code} into every pack."
cli.locale.scaffold_done: "Locale {code} scaffolded. Translate the *.yaml values (and set the real endonym), then run: python Heron.py --check-locale {code}"

