# Locale pack (en) — Surface 3: operator-facing CLI/deploy/update/migration
# messages. These stream into Pond's build/deploy/update panels and the
# `python Heron.py <action>` console. Looked up by tool language
# (user/.heron/locale) via the global i18n.t() (v1.9.1). ko is canonical.
# Format: flat dotted keys -> quoted strings. {name} = .format. \n = newline.

# ── Heron.py --help (argparse description/epilog/option help) ──────
# main() loads i18n before parse_args, so these resolve at parser-build time.
cli.help.description: "Build a Heron static site (targets PHP at runtime)."
cli.help.epilog: "Related commands:\n  python -m unittest discover -s system/tests   # unit tests\n  python system/tests/run_diagnostics.py        # integration diagnostics"
cli.help.clean: "Wipe both dist/ and .build_cache/, then build (full rebuild)."
cli.help.clean_cache: "Discard only .build_cache/, then build (keep dist/)."
cli.help.no_cache: "Disable incremental cache lookup/store (v0.6.5 behavior)."
cli.help.check: "Print program/schema version status + MANIFEST integrity, then exit."
cli.help.migrate: "Migrate the user/ schema up to the program version, then exit."
cli.help.dry_run: "With --migrate: preview changes without applying them."
cli.help.check_update: "Check GitHub for the latest version, then exit (refreshes Pond's banner cache)."
cli.help.update: "Download the latest release, overlay it, migrate, then exit."
cli.help.fetch_rclone: "Pre-fetch the rclone binary (download + SHA256 verify), then exit. Idempotent."
cli.help.deploy: "Incrementally sync dist/ to the server, then exit (preview with --dry-run)."
cli.help.check_config: "Parse/validate a candidate site.yaml from stdin exactly as the build does, then exit (0=valid). Does not touch the on-disk site.yaml — Pond's settings save gate."
cli.help.check_page_meta: "Parse/validate a candidate page meta.yaml (home/category) from stdin exactly as the build does, then exit (0=valid). REL: empty=home, otherwise a category relative path. Does not touch disk — Pond's page-settings save gate."
cli.help.deploy_diff: "Print a unified diff (JSON) of one modified file (dist-relative path from stdin) vs the live server, then exit. Pond-only — used by the deploy preview's Modified panel."
cli.help.check_locale: "Check locale packs against the canonical (en) key set, then exit. Bare = all locales; --check-locale ja = one. Reports missing/extra/stray-backslash keys (0=clean)."
cli.help.new_locale: "Scaffold a new locale CODE under system/locales/ (verbatim copy of the canonical pack), then exit. Edit the copies, then run --check-locale CODE."

