# Locale pack (en) — Surface 3: build/CLI messages (operator-facing).
# Format: flat dotted keys -> quoted strings. {name} = .format/strtr placeholder.
# Runtime lookup by tool language (user/.heron/locale). (Owned by Agent B — build.*)

build.warn.pillow_missing: "Image optimization is on but Pillow is not installed. The build will abort when it hits a raster image. Install it with `pip install Pillow`, or set images.enabled to false in site.yaml."
build.abort.pillow_raster: "Image optimization is on but Pillow is missing. Hit a raster image: {file}\n       Install it with `pip install Pillow`, or set images.enabled to false in site.yaml."

build.warn.legacy_home_key: "site.yaml: '{key}' moved to Articles/meta.yaml as of v0.4.6. Remove it from site.yaml and use the corresponding field in Articles/meta.yaml."
build.warn.schema_lower: "Schema stamp (user/.heron/version={schema}) is older than the program version (v{version}). Migrate with `python Heron.py --migrate` (preview with --migrate --dry-run) or via Pond's update feature."
build.warn.schema_higher: "Schema stamp (user/.heron/version={schema}) is newer than the program version (v{version}) — you are building new content with an older program. Upgrading the program is recommended."

build.warn.adsense_exclude_orphan: "google_adsense.exclude_urls entry \"{url}\" does not match any page URL in the build output — possibly a typo or a deleted article (no ads were blocked)."
build.warn.empty_category: "This category has no articles (empty category)."
build.issue.empty_slug: "Category folder name converts to an empty slug: {folder} — the category may not be built."
build.warn.non_ascii_slug: "URL slug contains non-ASCII characters: '{folder}' -> '{slug}'. The build proceeded normally, but for URL readability/shareability consider renaming the folder to ASCII (letters/digits/hyphens)."
build.warn.excluded_asset_ref: "Body references an asset excluded from the build: {ref}"
build.warn.unfilled_placeholder: "An unfilled placeholder was found in the template and stripped to an empty string: {{{{{name}}}}}."

# ── Image-config validation aborts (builder._parse_image_config) ───
# {received} renders via .format's !r conversion = repr() (preserves the original f-string {x!r}).
build.abort.images_widths_type: "site.yaml: images.widths must be a list of positive integers (got: {received!r})"
build.abort.images_widths_empty: "site.yaml: images.widths is empty"
build.abort.images_widths_list: "site.yaml: images.widths must be a list (got: {received!r})"
build.abort.images_max_width_int: "site.yaml: images.max_width must be an integer (got: {received!r})"
build.abort.images_quality_int: "site.yaml: images.quality must be an integer (got: {received!r})"
build.abort.images_quality_range: "site.yaml: images.quality must be in the range 0-100 (got: {received})"

# ── Build 16-step progress labels (builder._step) ──────────────────
# The label in `[ n/16] {label}`. Used by both the console and the
# build-report.md "per-step timing" table.
build.step.1: "Load settings (site.yaml / tokenizer parity)"
build.step.2: "Scan article folders (user/articles/)"
build.step.3: "Parse meta.yaml"
build.step.4: "Validate / build category tree"
build.step.5: "Sync assets / optimize images (WebP)"
build.step.6: "Copy site-wide assets"
build.step.7: "Copy category/home CSS"
build.step.8: "Render articles"
build.step.9: "Category pages"
build.step.10: "Home page"
build.step.11: "404 page"
build.step.12: "robots.txt / ads.txt"
build.step.13: "sitemap.xml"
build.step.14: "RSS / Atom feeds"
build.step.15: "Search index (dist/search.php)"
build.step.16: "Prune orphaned output"

# ── Build milestone / summary console lines (builder._emit / _live) ─
build.console.start: "Build start - Heron v{ver} ({time})"
build.console.no_cache: "  (incremental cache disabled - --no-cache)"
build.console.live_render: "  Article {i}/{n}  {slug}"
build.console.live_asset_img: "  Asset {i}/{n}  {slug}  ({img} images  {rel})"
build.console.live_asset_copy: "  Asset {i}/{n}  {slug}  ({rel})"
build.console.articles_done: "        {n} articles processed (cache {hit} hit / {miss} miss)."
build.console.assets_done: "        {n} articles' assets synced ({img} images converted)."
build.console.internal_links: "        Internal link check: {n} broken."
build.console.done: "Build complete: {art} articles, {cat} categories, {issue} to fix, {warn} to review{php}. ({elapsed:.1f}s)"
build.console.done_php: ", {n} PHP builds"
build.console.cache: "Incremental cache: {hit} hits / {miss} misses ({n} articles)."
build.console.output: "Output: dist/ (Heron)."
build.console.report_written: "Report: {name} generated ({path})."
build.console.report_write_failed: "[warning] Failed to write build-report.md: {error}"

# ── Tokenizer parity diagnostics (search.run_parity_test, global i18n.t()) ──
build.parity.ok: "[search] tokenizer parity OK ({n} fixtures)"
build.parity.cached: "[search] tokenizer parity (cached: {n} fixtures)"
# php_missing = `php -v` returned non-zero (installed but erroring). php_unavailable = cannot run at all (missing/timeout).
build.parity.php_missing: "PHP not available — skipping tokenizer parity test."
build.parity.php_unavailable: "PHP not available — skipping tokenizer parity test."
build.parity.fail_header: "Tokenizer parity failed (Python ≠ PHP):"

# ── Build report (report.py render/render_markdown + builder._write_build_report) ──
# render() — console (stderr) summary. render_markdown()/_write_build_report — build-report.md.
build.report.none: "Build report: nothing to fix / review / no PHP-built articles."
build.report.issues_header: "── To fix (output may be partially missing) ──"
build.report.warnings_header: "── To review (output is fine) ──"
build.report.php_header: "── PHP-built articles ({n}) ──"
build.report.summary: "Build report summary: {issue} to fix, {warn} to review"
build.report.summary_php: ", {n} PHP builds"
build.report.md_none: "_Build report: nothing to fix / review / no PHP-built articles._"
build.report.md_location: "  - Location: `{loc}`"
build.report.md_issues_h2: "## To fix (output may be partially missing)"
build.report.md_warnings_h2: "## To review (output is fine)"
build.report.md_php_h2: "## PHP-built articles ({n})"
build.report.md_php_note: "_Intended output — an article with live PHP beyond `imgBox`/`imgSlideBox` falls back to `index.php`. Not a system fault but the author's (web developer's) explicit choice._"
build.report.md_summary: "> **Build report summary**: {issue} to fix, {warn} to review"
build.report.abort_suffix: "Build aborted (system fault)."
build.report.md_title: "# Heron build report"
build.report.md_meta_version: "- **Version**: v{ver}"
build.report.md_meta_built: "- **Built at**: {time}"
build.report.md_meta_elapsed: "- **Elapsed**: {elapsed:.1f}s"
build.report.md_meta_result: "- **Result**: {art} articles · {cat} categories"
build.report.md_meta_followups: "- **To fix**: {issue} · **To review**: {warn}"
build.report.md_meta_php: " · **PHP builds**: {n}"
build.report.md_meta_cache: "- **Incremental cache**: {cache}"
build.report.md_cache_disabled: "disabled (--no-cache)"
build.report.md_cache_hitmiss: "{hit} hits / {miss} misses ({n} articles)"
build.report.md_cache_no_articles: "enabled (no target articles)"
build.report.md_progress_h2: "## Build progress"
build.report.md_steptime_h2: "## Per-step timing"
build.report.md_steptime_thead: "| Step | Description | Time(s) |"
build.report.md_footer: "_This document is auto-generated and refreshed on every build (in the folder containing build.py). It is not included in the dist/ output._"
