# ── home.php (home / system overview) ──────────────────────────────
admin.home.title: "Home"
admin.home.hero.version: "installed v{ver}"
admin.home.hero.body: "<strong>Heron</strong> is a <strong>PHP-oriented static site generator</strong>: keep each post as one folder and a single <code class=\"file\">python Heron.py</code> bakes the whole site into static files. <strong>Pond</strong> (this tool) is the <strong>thin admin panel</strong> for writing, managing, building and deploying those posts locally. Below is the full path a post takes to reach a visitor."
admin.home.flow.you.k: "You · Pond"
admin.home.flow.you.t: "Write a post"
admin.home.flow.you.d: "One <code class=\"file\">user/articles/</code> folder = one post (body + images + attachments)."
admin.home.flow.build.t: "Build (16 steps)"
admin.home.flow.build.d: "Markdown render · image WebP conversion · search index · sitemap/feed generation. Python 3 stdlib (+Pillow) only."
admin.home.flow.dist.k: "Output"
admin.home.flow.dist.d: "Static HTML + <code class=\"file\">search.php</code>. Same input yields byte-identical output (deterministic build)."
admin.home.flow.deploy.k: "Deploy · rclone"
admin.home.flow.deploy.t: "Incremental sync"
admin.home.flow.deploy.d: "Upload only changed files over SFTP; prune old files left only on the server."
admin.home.flow.serve.k: "Server · Visitor"
admin.home.flow.serve.t: "Apache + PHP"
admin.home.flow.serve.d: "Regular pages are served statically and instantly; only <code class=\"file\">/search.php</code> runs BM25 search."
admin.home.sec.components: "Components"
admin.home.card.builder.title: "Python builder"
admin.home.card.builder.body: "The single source of truth for all logic. It reads only <code class=\"file\">user/articles/</code> to produce <code class=\"file\">dist/</code>, and never touches <code class=\"file\">user/</code> (read-only)."
admin.home.card.builder.li1: "Raster images → multi-resolution WebP + <code class=\"file\">srcset</code> · lazy-load"
admin.home.card.builder.li2: "Incremental cache — re-render only changed posts"
admin.home.card.builder.li3: "Inlines client-JS-free search into <code class=\"file\">search.php</code>"
admin.home.card.pond.title: "this admin panel"
admin.home.card.pond.body: "Local-only single-user tool (loopback only). Instead of reimplementing Markdown/slug in PHP it calls the actual build scripts directly — so preview and build never diverge from the deployed result."
admin.home.card.pond.li1: "<strong>List · New · Edit</strong> — with live preview"
admin.home.card.pond.li2: "<strong>Build · Deploy</strong> — in one click"
admin.home.card.pond.li3: "<strong>Settings</strong> — edit deploy target + site-wide settings"
admin.home.card.config.title: "Config files"
admin.home.card.config.body: "Two layers of settings drive the build. Both are editable from the <strong>Settings</strong> screen."
admin.home.card.config.li1: "<code class=\"file\">site.yaml</code> — domain, site name, images/ads/JSON-LD and other site-wide settings (recorded only if it passes the same validation as the build)"
admin.home.card.config.li2: "<code class=\"file\">meta.yaml</code> — per-post slug, title, date, tags, visibility"
admin.home.card.config.li3: "<code class=\"file\">.heron/deploy.json</code> — deploy server info (private key as a path only)"
admin.home.card.url.title: "Permanent URLs &amp; safeguards"
admin.home.card.url.badge: "Design"
admin.home.card.url.body: "A post's URL is its <code class=\"file\">slug</code>, decoupled from folder and category, so moving categories keeps the URL the same."
admin.home.card.url.li1: "Delete moves to <code class=\"file\">.trash</code> (excluded from build, recoverable)"
admin.home.card.url.li2: "Before saving settings the previous version is backed up to <code class=\"file\">.heron/backups/</code>"
admin.home.card.url.li3: "One-click self-update + migration via GitHub releases"
