admin.home.qa.deploy.d: "Incrementally sync dist/ to the server"
admin.home.qa.deploy.set: "deploy.json configured"
admin.home.qa.deploy.unset: "deploy.json not set"
admin.home.qa.settings.t: "Settings"
admin.home.qa.settings.d: "Edit deploy target + site.yaml"
admin.home.qa.settings.has: "site.yaml present"
admin.home.qa.settings.none: "site.yaml missing"
admin.home.qa.note: "Build with the <strong>Build</strong> button at the top right · check for a new version with <strong>Check for updates</strong>."
admin.home.sec.principles: "Core principles"
admin.home.principle.li1: "<strong>Minimal operational dependencies</strong> — build uses Python stdlib, runtime is just Apache+PHP"
admin.home.principle.li2: "<strong>Single source of truth</strong> — logic lives in Python alone; Pond is a thin trigger"
admin.home.principle.li3: "<strong>Deterministic build</strong> — same input yields byte-identical dist/"
admin.home.principle.li4: "<strong>Server/content separation</strong> — one VirtualHost, no <code class=\"file\">.htaccess</code>"
admin.home.principle.li5: "<strong>Permanent URLs</strong> — slug is the URL, unchanged when moving categories"
admin.home.principle.li6: "<strong>Automatic dark mode</strong> — trusts the OS <code class=\"file\">prefers-color-scheme</code>"
admin.home.docs: "Full documentation lives at the repo root in <code class=\"file\">README.md</code> (English) / <code class=\"file\">README.ko.md</code> (Korean) — both are equally in-depth."

