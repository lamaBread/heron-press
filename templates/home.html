<!DOCTYPE html>
<html lang='{{LANG}}'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    {{META_TAGS}}
    <link href='/assets/common_template.css' rel='stylesheet' type='text/css'>
    <link rel='alternate' type='application/atom+xml' title='{{PAGE_TITLE}} (Atom)' href='/feed.atom'>
    <link rel='alternate' type='application/rss+xml' title='{{PAGE_TITLE}} (RSS)' href='/feed.rss'>
    <title>{{PAGE_TITLE}}</title>
</head>
<body>
    <header>
        <a id='TITLE' href='/'>
            {{MAIN_TITLE}}
        </a>
    </header>
    <nav>
        <form class='nav-search' action='/search.php' method='get' role='search'>
            <input type='search' name='q' placeholder='검색' aria-label='Search'>
        </form>
        <div id='nav-tracker'><a href='/'>Home</a></div>
        {{NAV_LINKS}}
    </nav>
    <div class="gap">
        <p>Recent posts</p>
    </div>
    <section class="{{HOME_SECTION_CLASS}}" data-pagination-group="home-recent" data-per-page="{{HOME_PER_PAGE}}">
        {{ARTICLE_LIST}}
    </section>
    {{PAGINATION_NAV}}
    <footer>
        <p>Copyright&copy; {{COPYRIGHT_YEAR}}. {{COPYRIGHT_HOLDER}}. All rights reserved.</p>
    </footer>
    <script src="/assets/pagination.js"></script>
</body>
</html>
