# Heron — site-wide settings (example values).
#
# This file is the demo config that builds as-is. To use it for your own site,
# replace your-domain.com / Your Name etc. below with your real values.
#
# Per-page overrides:
#   - Home (main page)        — user/articles/meta.yaml
#   - Category index pages    — user/articles/<category-path>/meta.yaml
#   - Article pages           — user/articles/<category-path>/<article-path>/meta.yaml


# Site domain / DNS hostname (e.g. your-domain.com)
domain: your-domain.com
# Site base URL / scheme + host (used for canonical / sitemap / feeds)
base_url: https://your-domain.com

# Site name / default for og:site_name and the home/category/system page <title>
name: Heron Demo
# Large text at the top-left of the header / arbitrary string
main_title: Heron Demo
# Default author / arbitrary string (fallback when an article's seo.author is empty)
default_author: Your Name
# Default og:image / site-relative or absolute URL (fallback when seo.og_image is empty on article/home/category)
default_og_image: /assets/default-og.png

# Default <html lang> for every page / BCP 47 code (e.g. ko / en / ja)
lang: en

# Default <title> prefix — `{prefix}{title}{suffix}` / arbitrary string
default_title_prefix: ""
# Default <title> suffix / arbitrary string
default_title_suffix: ""

# Copyright holder / arbitrary string (used in the footer)
copyright_holder: Your Name
# Copyright start year / integer (e.g. 2025)
copyright_year_start: 2025

# Articles per page on a category's own page / positive integer (overridden by per_page in the category meta.yaml)
category_per_page: 20
# Articles per page when a category is embedded as a section on a parent page / positive integer
category_preview_per_page: 5

# Max characters for the feed summary (Atom <summary> / RSS <description>) / positive integer
description_truncate: 150

# v1.4.0: site-wide toggle for the prev/next article navigation in the article footer.
# Sorts same-parent-folder (direct sibling) articles by date ascending and shows two
# cards at the end of the article body (after the last section) with prev=older,
# next=newer. noindex articles are excluded from the sibling pool (UI navigation is
# separate from indexing policy, so such an article can still show its own prev/next
# but won't appear in others' prev/next). There is no per-article off switch — a
# page-level toggle would be meaningless. Disabled when the block is absent or false.
prev_next:
  enabled: true

# Removed in v1.4.0 — the five keys (reserved_slugs / warn_on_underscore_ref /
# warn_on_missing_asset / error_404_title / search_title) were promoted to
# system-internal constants (RESERVED_SLUGS / DEFAULT_ERROR_404_TITLE /
# DEFAULT_SEARCH_TITLE in system/scripts/builder.py + the "always warn" behavior of
# warn_on_underscore_ref fixed in place + warn_on_missing_asset, which was dead config).
# If the keys linger in an old site.yaml the parser silently ignores them.

# /robots.txt body / multi-line string
robots_txt_main: |
  User-agent: *
  Allow: /

  Sitemap: https://your-domain.com/sitemap.xml

# Automatic image optimization policy (WebP + multiple resolutions + lazy loading)
images:
  # Master toggle for image optimization / true / false
  enabled: true
  # List of variant widths (px) to generate / list of positive integers
  widths: [400, 800, 1600]
  # Downscale when the source is larger than this / 0 or positive integer
  max_width: 1600
  # WebP encoder quality / 0 - 100
  quality: 85
  # Auto-attach loading="lazy" to every <img> / true / false
  lazy_loading: true
  # Default sizes attribute paired with srcset / CSS media query
  default_sizes: "(max-width: 800px) 100vw, 800px"

# schema.org JSON-LD in the article page <head> (Article + BreadcrumbList). Augments rather than replaces the existing OG/canonical etc.
jsonld:
  # Master toggle / true / false. When false no article emits it (opt out per article via seo.jsonld:false, but a site-level off can't be restored per article)
  enabled: true

# PHP signature variables / `{var_name: string}` map.
# The original PHP server auto_prepended PHP/GlobalVariables.php to substitute tokens
# like `{$site_credit}` inside article-body imgBox captions at runtime. The static
# build has no such runtime, so copying the values here substitutes them into captions
# at build time. Undefined variables become the empty string (matching PHP's echo
# behavior for undefined variables). Omit the leading `$` from the variable name.
# (Used by the user/articles/About example article.)
php_globals:
  site_credit: "Illustrations by the Heron Demo team"

# Google AdSense integration (v1.1.3, replaced in v1.1.5 with a URL-based exclude list).
# Auto-disabled when all three fields are an empty string / empty list / absent key —
# the below is the default disabled (no ads) state. To turn ads on, fill ads_txt and
# head_script with your own AdSense publisher values. There is no separate enabled
# master toggle (consistent with SeoMeta's 3-state None/''/'text' principle).
google_adsense:
  # /ads.txt body / multi-line string (a literal `|` block is recommended — trailing
  # newline preserved automatically). An empty string produces no dist/ads.txt and
  # auto-deletes a leftover ads.txt from a previous build. Being a site-root static
  # file exposed externally, it's directly verifiable at https://your-domain.com/ads.txt.
  # e.g. google.com, pub-0000000000000000, DIRECT, 0000000000000000
  ads_txt: ""
  # Auto-ads script injected raw into every page <head> (no escaping — the author's
  # given string is trusted). An empty string injects into none of the 5 pages (the
  # placeholder line itself is removed, leaving no blank line). Applies to
  # article/home/category/404/search.php. Pond.php and system/admin/ never leak into
  # dist, so they're naturally excluded. e.g.:
  #   <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0000000000000000" crossorigin="anonymous"></script>
  head_script: ""
  # Added in v1.1.5 — list of page URLs to exclude from head_script injection / list of
  # strings. Site-relative absolute paths (starting with '/'), matched case-sensitively
  # and exactly including the trailing slash. The loader script is not placed in the head
  # of a matched URL's page, so Google auto-ads JS itself never loads = ads blocked at the
  # source. An empty list / absent key behaves like v1.1.3 (inject into all 5 pages). A
  # non-matching URL (typo / deleted article) is auto-reported at build end under the
  # build-report.md "items to review". In-page ad placement is still decided by Google
  # auto-ads; this field only controls the per-page on/off of "which URLs get the loader".
  # Per-page canonical URL forms:
  #   home      = /
  #   article   = /<slug>/             (e.g. /about/, /welcome-to-heron/)
  #   category  = /<slug_path>/        (e.g. /blog/, /blog/tutorials/)
  #   404       = /404.html
  #   search    = /search.php
  # e.g. ['/', '/404.html', '/search.php', '/about/'] — blocks home/404/search/about.
  exclude_urls: []
